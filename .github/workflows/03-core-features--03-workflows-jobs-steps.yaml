name: workflows, jobs and steps

on:  
  workflow_dispatch:
jobs: 
  job-1:
    runs-on: ubuntu-latest  
    steps:
      - run: echo "a job consists"
      - run: echo " one or more steps"
      - run: echo " which run sequentially"
      - run: echo " within the same compute enviornment"
  job-2:
    runs-on: ubuntu-24.04
    steps:
      - run: echo "mul tiple jobs can run in parallel"
  job-3:
    runs-on: ubuntu-24.04
    needs: 
      - job-1
      - job-2
    steps:
      - run: echo "they can also depend on one another"
  job-4:
    runs-on: ubuntu-latest
    needs: 
      - job-2
      - job-3
    steps:
      - run: echo " any jobs can make dependency like this"
  
    
    
     
